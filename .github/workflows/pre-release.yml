name: Publish Release Assets

on:
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:
    inputs:
      branch:
        description: 用于校验 tag 所属历史的分支名
        required: true
        default: main
        type: string
      tag:
        description: 目标 Release tag，例如 v0.0.2
        required: true
        type: string
      publish_latest:
        description: 是否覆盖 docs/updates/latest.json
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish-release-assets:
    name: Build Release Assets
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            let release;
            let targetBranch;
            let publishLatest;

            if (context.eventName === 'release') {
              release = context.payload.release;
              targetBranch = 'main';
              publishLatest = 'true';
            } else {
              const tag = core.getInput('tag');
              release = (await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              })).data;
              targetBranch = core.getInput('branch') || 'main';
              publishLatest = core.getInput('publish_latest') || 'false';
            }

            core.setOutput('release_id', String(release.id));
            core.setOutput('release_name', release.name || release.tag_name);
            core.setOutput('tag', release.tag_name);
            core.setOutput('page_url', release.html_url);
            core.setOutput('published_at', release.published_at || '');
            core.setOutput('notes_markdown', release.body || '');
            core.setOutput('target_branch', targetBranch);
            core.setOutput('publish_latest', publishLatest);

      - name: Validate tag belongs to target branch
        id: validate
        env:
          TARGET_BRANCH: ${{ steps.release.outputs.target_branch }}
          TARGET_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch origin "$TARGET_BRANCH" --tags

          tag_commit="$(git rev-list -n 1 "$TARGET_TAG")"
          if [[ -z "$tag_commit" ]]; then
            echo "未找到 tag：$TARGET_TAG" >&2
            exit 1
          fi

          if ! git merge-base --is-ancestor "$tag_commit" "origin/$TARGET_BRANCH"; then
            echo "Tag $TARGET_TAG 不属于 origin/$TARGET_BRANCH 历史，拒绝继续发布。" >&2
            exit 1
          fi

          echo "tag_commit=$tag_commit" >> "$GITHUB_OUTPUT"

      - name: Checkout tag commit
        env:
          TARGET_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          git checkout --detach "$TARGET_TAG"

      - name: Build unsigned dev package
        env:
          CAPS_NAV_DEV_DISABLE_SIGNING: "1"
        run: |
          chmod +x ./tools/package.sh
          ./tools/package.sh --mode dev --unsigned-dev --headless-dmg

      - name: Read build metadata
        id: build
        shell: bash
        run: |
          set -euo pipefail

          app_path=".build/ReleasePackaging/Build/Products/Release/Caps Nav.app"
          info_plist="$app_path/Contents/Info.plist"

          if [[ ! -f "$info_plist" ]]; then
            echo "未找到构建产物信息文件：$info_plist" >&2
            exit 1
          fi

          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$info_plist")"
          minimum_system_version="$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$info_plist" 2>/dev/null || true)"
          if [[ -z "$minimum_system_version" ]]; then
            minimum_system_version="$(/usr/libexec/PlistBuddy -c 'Print :MinimumOSVersion' "$info_plist" 2>/dev/null || true)"
          fi
          if [[ -z "$minimum_system_version" ]]; then
            minimum_system_version="13.0"
          fi

          dmg_path="$(find artifacts/dev -maxdepth 1 -type f -name '*.dmg' ! -name '*.sha256' | head -n 1)"
          if [[ -z "$dmg_path" ]]; then
            echo "未找到 dev 安装包（DMG）产物" >&2
            exit 1
          fi

          sha_path="${dmg_path}.sha256"
          if [[ ! -f "$sha_path" ]]; then
            echo "未找到 SHA-256 摘要文件：$sha_path" >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "minimum_system_version=$minimum_system_version"
            echo "dmg_path=$dmg_path"
            echo "sha_path=$sha_path"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        id: assets
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          DMG_PATH: ${{ steps.build.outputs.dmg_path }}
          SHA_PATH: ${{ steps.build.outputs.sha_path }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const releaseId = Number(process.env.RELEASE_ID);
            const files = [process.env.DMG_PATH, process.env.SHA_PATH];

            const existingAssets = await github.paginate(
              github.rest.repos.listReleaseAssets,
              {
                owner,
                repo,
                release_id: releaseId,
                per_page: 100,
              }
            );

            const uploadedAssets = {};

            for (const filePath of files) {
              const assetName = path.basename(filePath);
              const existingAsset = existingAssets.find((asset) => asset.name === assetName);

              if (existingAsset) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: existingAsset.id,
                });
              }

              const data = fs.readFileSync(filePath);
              const uploaded = await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: releaseId,
                name: assetName,
                data,
                headers: {
                  'content-type': filePath.endsWith('.sha256')
                    ? 'text/plain; charset=utf-8'
                    : 'application/octet-stream',
                  'content-length': data.length,
                },
              });

              uploadedAssets[assetName] = uploaded.data.browser_download_url;
            }

            core.setOutput('dmg_url', uploadedAssets[path.basename(process.env.DMG_PATH)]);
            core.setOutput('sha_url', uploadedAssets[path.basename(process.env.SHA_PATH)]);

      - name: Checkout main branch for Pages update
        if: ${{ steps.release.outputs.publish_latest == 'true' }}
        run: |
          set -euo pipefail
          git checkout main
          git pull --ff-only origin main

      - name: Compare versions before publishing latest metadata
        if: ${{ steps.release.outputs.publish_latest == 'true' }}
        env:
          CANDIDATE_VERSION: ${{ steps.build.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" && -f "docs/updates/latest.json" ]]; then
            node .github/scripts/generate-update-json.js compare \
              --candidate "$CANDIDATE_VERSION" \
              --current-file "docs/updates/latest.json"
          fi

      - name: Generate latest update metadata
        if: ${{ steps.release.outputs.publish_latest == 'true' }}
        env:
          VERSION: ${{ steps.build.outputs.version }}
          PUBLISHED_AT: ${{ steps.release.outputs.published_at }}
          MINIMUM_SYSTEM_VERSION: ${{ steps.build.outputs.minimum_system_version }}
          PAGE_URL: ${{ steps.release.outputs.page_url }}
          DOWNLOAD_URL: ${{ steps.assets.outputs.dmg_url }}
          NOTES_MARKDOWN: ${{ steps.release.outputs.notes_markdown }}
        run: |
          set -euo pipefail

          mkdir -p docs/updates

          node .github/scripts/generate-update-json.js generate \
            --output "docs/updates/latest.json" \
            --version "$VERSION" \
            --published-at "$PUBLISHED_AT" \
            --minimum-system-version "$MINIMUM_SYSTEM_VERSION" \
            --page-url "$PAGE_URL" \
            --download-url "$DOWNLOAD_URL" \
            --notes-markdown "$NOTES_MARKDOWN"

      - name: Commit latest metadata back to main
        if: ${{ steps.release.outputs.publish_latest == 'true' }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/updates/latest.json

          if git diff --cached --quiet; then
            echo "latest.json 无变更，跳过提交。"
            exit 0
          fi

          git commit -m "chore: update latest release metadata"
          git push origin HEAD:main

      - name: Write workflow summary
        run: |
          {
            echo "### Release 产物已处理"
            echo
            echo "- Release: [${{ steps.release.outputs.release_name }}](${{ steps.release.outputs.page_url }})"
            echo "- Tag: \`${{ steps.release.outputs.tag }}\`"
            echo "- Version: \`${{ steps.build.outputs.version }}\`"
            echo "- Target Branch: \`${{ steps.release.outputs.target_branch }}\`"
            echo "- Publish Latest: \`${{ steps.release.outputs.publish_latest }}\`"
            echo "- DMG: [下载地址](${{ steps.assets.outputs.dmg_url }})"
            if [[ "${{ steps.release.outputs.publish_latest }}" == "true" ]]; then
              echo "- latest.json: \`docs/updates/latest.json\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
